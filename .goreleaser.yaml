version: 2

project_name: dnsaid

builds:
  - main: ./cmd/dnsaid
    binary: dnsaid
    # The release version is compiled in from internal/version/version.go
    # (rewritten by tagpr before tagging), so no ldflags injection is needed.
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

# Container images are built with ko (no Dockerfile, no Docker daemon) and
# pushed to GitHub Container Registry alongside the release.
kos:
  - repositories:
      - ghcr.io/haruotsu/dns-aid-go
    main: ./cmd/dnsaid
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    platforms:
      - linux/amd64
      - linux/arm64
    tags:
      - "{{ .Tag }}"
      - latest
    # bare keeps the image name exactly the repository above instead of
    # appending the import path.
    bare: true
    creation_time: "{{ .CommitTimestamp }}"
    ko_data_creation_time: "{{ .CommitTimestamp }}"
    labels:
      org.opencontainers.image.source: https://github.com/haruotsu/dns-aid-go
      org.opencontainers.image.description: DNS-based AI agent discovery (DNS-AID)
      org.opencontainers.image.licenses: Apache-2.0
      org.opencontainers.image.version: "{{ .Tag }}"

checksum:
  name_template: checksums.txt

# tagpr owns CHANGELOG.md and the GitHub Release body; goreleaser only
# attaches the built artifacts to the release tagpr created.
changelog:
  disable: true

release:
  mode: keep-existing
