version: 2

project_name: dnsaid

builds:
  - main: ./cmd/dnsaid
    binary: dnsaid
    # The release version is compiled in from internal/version/version.go
    # (rewritten by tagpr before tagging), so no ldflags injection is needed.
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

# tagpr owns CHANGELOG.md and the GitHub Release body; goreleaser only
# attaches the built artifacts to the release tagpr created.
changelog:
  disable: true

release:
  mode: keep-existing
