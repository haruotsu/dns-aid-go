name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

# Cancel superseded runs of the same branch/PR to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: go mod tidy check
        run: go mod tidy -diff
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test -race -coverprofile=coverage.out ./...

  # Validate .goreleaser.yaml on every change so a broken release config
  # surfaces in PR review, not during the release itself.
  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: goreleaser/goreleaser-action@v6
        with:
          # Same major as the release job in tagpr.yml, so check validates
          # against the goreleaser that will actually run the release.
          version: "~> v2"
          args: check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # golangci-lint must be built with a Go version >= the one targeted in
          # go.mod (currently 1.26); v2.12.2 is built with go1.26.
          version: v2.12.2
